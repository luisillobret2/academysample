services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mendlearn
      POSTGRES_PASSWORD: mendlearn
      POSTGRES_DB: mendlearn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mendlearn"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://mendlearn:mendlearn@db:5432/mendlearn
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-in-production}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
